# =============================================
# MailPilot Backend Configuration
# =============================================
# All secrets are read from environment variables.
# Set them in your .env file or deployment platform.

# Server
server.port=${PORT:8080}

# PostgreSQL (Supabase)
spring.datasource.url=${SUPABASE_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Encryption (AES-256 for app passwords)
encryption.secret-key=${ENCRYPTION_SECRET_KEY}
encryption.iv-spec=${ENCRYPTION_IV}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB